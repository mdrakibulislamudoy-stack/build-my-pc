version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: build-my-pc-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: build-my-pc
    volumes:
      - mongodb_data:/data/db
    networks:
      - build-my-pc-network

  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.server
    container_name: build-my-pc-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/build-my-pc
      JWT_SECRET: your_jwt_secret_key_here_change_in_production
      JWT_EXPIRE: 7d
      JWT_REFRESH_SECRET: your_refresh_token_secret_here
      JWT_REFRESH_EXPIRE: 30d
      CLIENT_URL: http://localhost
    depends_on:
      - mongodb
    networks:
      - build-my-pc-network

  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
    container_name: build-my-pc-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - build-my-pc-network

volumes:
  mongodb_data:

networks:
  build-my-pc-network:
    driver: bridge
